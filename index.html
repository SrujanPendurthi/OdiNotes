<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OdiNotes</title>
  </head>
  <body class="flex h-screen w-screen flex-col bg-bg text-fg antialiased overflow-hidden select-none">
    <!-- Top bar: sits on the macOS traffic-light row. Holds the sidebar
         toggle and the open tabs, and doubles as the window drag region. -->
    <div
      id="titlebar"
      data-tauri-drag-region
      class="flex h-8 shrink-0 items-stretch border-b border-border bg-panel select-none"
    >
      <button
        id="btn-toggle-sidebar"
        title="Toggle sidebar"
        class="flex shrink-0 items-center px-2 text-muted hover:bg-border hover:text-fg"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <!-- Open tabs (populated by JS; hidden when nothing is open) -->
      <div
        id="tabbar"
        data-tauri-drag-region
        class="hidden min-w-0 flex-1 items-stretch overflow-x-auto"
      ></div>
    </div>

    <div id="app" class="flex min-h-0 flex-1">
      <!-- Sidebar / file explorer -->
      <aside
        id="sidebar"
        class="flex w-64 shrink-0 flex-col border-r border-border bg-panel"
      >
        <header class="flex items-center gap-1.5 px-2 py-2 border-b border-border">
          <div class="relative min-w-0 flex-1">
            <span class="pointer-events-none absolute left-2 top-1/2 -translate-y-1/2 text-muted">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </span>
            <input
              id="search"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="Search notes…"
              disabled
              class="w-full rounded border border-border bg-bg py-1 pl-7 pr-2 text-xs text-fg placeholder:text-muted outline-none focus:border-accent disabled:opacity-40"
            />
          </div>
          <div class="flex items-center gap-1">
            <button
              id="btn-new-file"
              title="New note"
              class="rounded p-1 text-muted hover:bg-border hover:text-fg disabled:opacity-30"
              disabled
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg>
            </button>
            <button
              id="btn-new-folder"
              title="New folder"
              class="rounded p-1 text-muted hover:bg-border hover:text-fg disabled:opacity-30"
              disabled
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/><path d="M12 10v6"/><path d="M9 13h6"/></svg>
            </button>
          </div>
        </header>

        <!-- File tree (populated by JS) -->
        <nav id="tree" class="flex-1 overflow-y-auto px-1.5 py-2 text-sm"></nav>

        <!-- Fuzzy search results (shown while searching; populated by JS) -->
        <nav id="search-results" class="hidden flex-1 overflow-y-auto px-1.5 py-2 text-sm"></nav>

        <footer class="border-t border-border p-2">
          <button
            id="btn-open-vault"
            title="Open Vault…"
            class="flex w-full items-center gap-2 rounded bg-border/60 px-3 py-1.5 text-xs font-medium text-fg hover:bg-border"
          >
            <svg class="shrink-0 text-muted" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
            <span id="vault-name" class="min-w-0 flex-1 truncate text-left">Open Vault…</span>
            <svg class="shrink-0 text-muted" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
          </button>
        </footer>
      </aside>

      <!-- Main editor area -->
      <main class="flex min-w-0 flex-1 flex-col bg-bg">
        <div id="editor-wrap" class="relative flex-1 overflow-hidden">
          <!-- Empty state -->
          <div
            id="empty-state"
            class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-center text-muted"
          >
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
            <p class="text-sm">Open a vault, then pick or create a note.</p>
          </div>
          <!-- CodeMirror mounts here -->
          <div id="editor" class="h-full w-full select-text"></div>
        </div>

        <!-- Status bar -->
        <footer
          class="flex items-center justify-between border-t border-border px-3 py-1 text-xs text-muted"
        >
          <span id="status-path" class="truncate">No file open</span>
          <span id="status-save"></span>
        </footer>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
